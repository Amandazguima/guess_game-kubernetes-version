{{/*
Secret com as credenciais do Postgres.
Decisão do projeto: senha em texto puro (stringData) para facilitar
a leitura durante a avaliação. Em produção usaria-se base64 + selo.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "guess-game.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
